name: Generate NextJS Build
on: [workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    
    # This ensures all manual 'run' commands execute inside your app folder
    defaults:
      run:
        working-directory: ./hyperlocal-customer-web-app

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          # CRITICAL FIX: Tell the action where the lock file is located
          cache-dependency-path: 'hyperlocal-customer-web-app/package-lock.json'

      - name: Install Dependencies
        # 'npm ci' is faster and more reliable for CI/CD builds
        run: npm ci 

      - name: Build Next.js App
        run: npm run build

      - name: Archive Production Artifact
        uses: actions/upload-artifact@v4
        with:
          name: nextjs-build
          # IMPORTANT: Upload paths must be relative to the repository root
          path: |
            hyperlocal-customer-web-app/.next/
            hyperlocal-customer-web-app/public/
            hyperlocal-customer-web-app/package.json
            hyperlocal-customer-web-app/next.config.js
